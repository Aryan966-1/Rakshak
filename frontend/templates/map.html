<!-- frontend/templates/map.html -->
<!--
  Map page — interactive Leaflet map of the Indian railway network.
  Displays station markers, ticket indicators, alert markers,
  route polylines, and simulated train movement.
  All data is fetched from Django API endpoints by map.js.
-->
{% extends "base.html" %}
{% load static %}

{% block extra_head %}
<style>
    /* Map page needs full-height layout */
    .map-page { display: flex; flex-direction: column; gap: 0; height: calc(100vh - 160px); }
    .map-container { flex: 1; position: relative; min-height: 400px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-primary); }
    #railway-map { width: 100%; height: 100%; z-index: 1; }
    .map-legend { display: flex; gap: 20px; padding: 12px 20px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-primary); flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--text-secondary); }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
    .legend-dot--healthy { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
    .legend-dot--warning { background: var(--accent-yellow); box-shadow: 0 0 6px var(--accent-yellow); }
    .legend-dot--critical { background: var(--accent-red); box-shadow: 0 0 6px var(--accent-red); }
    .legend-dot--ticket { background: #3b82f6; box-shadow: 0 0 6px rgba(59,130,246,0.5); }
    .legend-dot--train { background: #a78bfa; box-shadow: 0 0 6px rgba(167,139,250,0.5); }
    .map-stats { display: flex; gap: 16px; flex-wrap: wrap; }
    .map-stat { background: var(--bg-card); border: 1px solid var(--border-primary); border-radius: 10px; padding: 12px 20px; display: flex; align-items: center; gap: 10px; }
    .map-stat-value { font-family: 'JetBrains Mono', monospace; font-size: 1.3rem; font-weight: 600; color: var(--text-primary); }
    .map-stat-label { font-size: 0.8rem; color: var(--text-secondary); }
    @media (max-width: 768px) {
        .map-page { height: auto; }
        .map-container { min-height: 50vh; }
        .map-legend { flex-wrap: wrap; gap: 12px; }
        .map-stats { gap: 8px; }
        .map-stat { padding: 8px 14px; }
    }
</style>
{% endblock %}

{% block content %}
<div class="map-page">

    <!-- Map Stats Bar (populated from API) -->
    <section class="map-stats" id="map-stats">
        <div class="map-stat">
            <div class="map-stat-value">—</div>
            <div class="map-stat-label">Stations Monitored</div>
        </div>
        <div class="map-stat">
            <div class="map-stat-value">—</div>
            <div class="map-stat-label">Track Sections</div>
        </div>
        <div class="map-stat">
            <div class="map-stat-value">—</div>
            <div class="map-stat-label">Active Routes</div>
        </div>
        <div class="map-stat">
            <div class="map-stat-value">—</div>
            <div class="map-stat-label">Railway Zones</div>
        </div>
    </section>

    <!-- Legend -->
    <div class="map-legend" id="map-legend">
        <div class="legend-item">
            <div class="legend-dot legend-dot--healthy"></div>
            <span>Healthy</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot legend-dot--warning"></div>
            <span>Warning</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot legend-dot--critical"></div>
            <span>Critical</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot legend-dot--ticket"></div>
            <span>Active Ticket</span>
        </div>
        <div class="legend-item">
            <span>━━</span>
            <span>Rail Route</span>
        </div>
        <div class="legend-item">
            <span>🚂</span>
            <span>Live Train</span>
        </div>
    </div>

    <!-- Map Container -->
    <div class="map-container" id="map-container">
        <div id="railway-map"></div>
    </div>
</div>

{% endblock %}

{% block extra_scripts %}
<script src="{% static 'js/map.js' %}?v=2"></script>
<script src="{% static 'js/train_simulation.js' %}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Initialize the API-driven map (replaces old json_script approach)
        if (typeof initRailwayMapFromAPI === 'function') {
            initRailwayMapFromAPI();
        }
    });
</script>
{% endblock %}
